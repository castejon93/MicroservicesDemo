# ============================================================
# FILE: azure-pipelines-products-ci.yml
# PURPOSE: Build & Test Products Microservice ONLY
# TRIGGER: Changes in src/Services/Products/** OR src/Shared/**
# ============================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - src/Services/Products/**    # Products service changes
      - src/Shared/**               # Shared library changes
    exclude:
      - '**/*.md'

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - src/Services/Products/**
      - src/Shared/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'
  serviceName: 'Products'
  servicePath: 'src/Services/Products'

stages:
# ============================================
# BUILD STAGE
# ============================================
- stage: Build
  displayName: 'Build Products Microservice'
  jobs:
  - job: BuildJob
    displayName: 'Build & Publish'
    steps:
    
    - checkout: self
      fetchDepth: 1

    - task: UseDotNet@2
      displayName: 'Install .NET $(dotnetVersion)'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
        includePreviewVersions: true

    # Restore only Products-related projects
    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet Packages'
      inputs:
        command: 'restore'
        projects: |
          $(servicePath)/**/*.csproj
          src/Shared/**/*.csproj

    # Build only Products-related projects
    - task: DotNetCoreCLI@2
      displayName: 'Build $(serviceName) Service'
      inputs:
        command: 'build'
        projects: '$(servicePath)/**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    # Publish Products.WebAPI
    - task: DotNetCoreCLI@2
      displayName: 'Publish $(serviceName).WebAPI'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '$(servicePath)/Products.WebAPI/Products.WebAPI.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/$(serviceName) --no-build'
        zipAfterPublish: true

    # Build Docker image (optional)
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        containerRegistry: 'YourACRConnection'
        repository: 'microservices/products-api'
        command: 'build'
        Dockerfile: '$(servicePath)/Products.WebAPI/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(Build.BuildId)
          latest
      condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')

    # Publish artifacts
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'products-drop'
        publishLocation: 'Container'