# ============================================================
# FILE: azure-pipelines-auth-cd.yml
# PURPOSE: Deploy Auth Microservice to Azure
# TRIGGER: Manual or after successful Auth CI
# ============================================================

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'AzureServiceConnection'
  resourceGroupName: 'rg-microservices-dev'
  appName: 'auth-api'                           # Azure App Service name
  ciPipelineName: 'Auth-CI'                     # Name of CI pipeline

stages:
# ============================================
# DEPLOY TO DEV
# ============================================
- stage: DeployDev
  displayName: 'Deploy Auth to Dev'
  jobs:
  - deployment: DeployAuthDev
    displayName: 'Deploy Auth Microservice'
    environment: 'Auth-Development'
    strategy:
      runOnce:
        deploy:
          steps:
          
          # Download Auth artifacts
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Auth Artifacts'
            inputs:
              buildType: 'specific'
              project: '$(System.TeamProjectId)'
              definition: '$(ciPipelineName)'
              buildVersionToDownload: 'latest'
              artifactName: 'auth-drop'
              targetPath: '$(Pipeline.Workspace)/drop'

          # Deploy to Azure App Service
          - task: AzureWebApp@1
            displayName: 'Deploy to $(appName)'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appName)'
              package: '$(Pipeline.Workspace)/drop/Auth/*.zip'

          # Configure App Settings
          - task: AzureAppServiceSettings@1
            displayName: 'Configure Settings'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appName: '$(appName)'
              resourceGroupName: '$(resourceGroupName)'
              appSettings: |
                [
                  { "name": "ASPNETCORE_ENVIRONMENT", "value": "Production" },
                  { "name": "JwtSettings__Issuer", "value": "MicroservicesDemo" },
                  { "name": "JwtSettings__Audience", "value": "MicroservicesDemo" }
                ]